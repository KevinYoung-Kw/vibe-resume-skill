<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1200, initial-scale=1">
  <title>Vibe Resume Demo - QA</title>
  <link rel="stylesheet" href="demo.css">
</head>
<body data-demo="qa" data-duration="7">
  <main class="stage">
    <section class="layout qa-layout">
      <section class="qa-main panel">
        <div class="brand"><span class="brand-mark"></span><span>PDF 级 QA</span></div>
        <h1 class="headline">好看还不够，必须可投递。</h1>
        <p class="subline">每份简历都要导出、渲染、截图检查，再确认完成。</p>

        <div class="qa-paper-area">
          <div class="resume-shot qa-shot">
            <iframe class="resume-frame" src="../templates/basic-a4/resume.html" title="basic-a4 HTML resume template" scrolling="no"></iframe>
            <div class="scan-line"></div>
          </div>
          <div class="qa-guide guide-a4"></div>
          <div class="qa-guide guide-bottom"></div>
        </div>
      </section>

      <aside class="qa-panel panel">
        <h3>版式硬约束</h3>
        <div class="qa-list">
          <div class="qa-item"><i class="check">✓</i><span>A4 纵向，一页完成</span></div>
          <div class="qa-item"><i class="check">✓</i><span>PingFang SC 字体检查</span></div>
          <div class="qa-item"><i class="check">✓</i><span>底部留白 ≤ 15%</span></div>
          <div class="qa-item"><i class="check">✓</i><span>头像保持原色</span></div>
          <div class="qa-item"><i class="check">✓</i><span>二维码完整可扫</span></div>
          <div class="qa-item"><i class="check">✓</i><span>无旧信息与敏感词</span></div>
        </div>
        <div class="final-seal">PDF 可直接投递</div>
      </aside>
    </section>
    <div class="footer-note">最终产物不是一份 HTML 截图，而是经过检查的可投递 PDF。</div>
  </main>
  <script src="demo.js"></script>
</body>
</html>
